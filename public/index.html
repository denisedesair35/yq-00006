<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地资料整理小工具</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📁 本地资料整理小工具</h1>
      <p class="subtitle">扫描文件夹、按类型统计、标记处理状态</p>
    </header>

    <section class="scan-section">
      <div class="scan-form">
        <label for="folderPath">文件夹路径：</label>
        <input type="text" id="folderPath" placeholder="例如：D:\我的资料" />
        <button id="scanBtn" class="btn btn-primary">扫描文件夹</button>
        <button id="refreshBtn" class="btn btn-secondary" style="display:none;">重新扫描</button>
      </div>
      <div id="scanMessage" class="message"></div>
    </section>

    <section id="statsSection" class="stats-section" style="display:none;">
      <div class="stats-header">
        <h2>📊 统计概览</h2>
        <span id="currentFolder" class="current-folder"></span>
      </div>
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-label">文件总数</div>
          <div class="stat-value" id="statTotalCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总大小</div>
          <div class="stat-value" id="statTotalSize">0 B</div>
        </div>
        <div class="stat-card stat-pending">
          <div class="stat-label">待处理</div>
          <div class="stat-value" id="statPending">0</div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-label">已整理</div>
          <div class="stat-value" id="statDone">0</div>
        </div>
        <div class="stat-card stat-ignored">
          <div class="stat-label">忽略</div>
          <div class="stat-value" id="statIgnored">0</div>
        </div>
      </div>

      <div class="stats-detail">
        <div class="stats-group">
          <h3>按文件类型</h3>
          <div id="byType" class="stats-list"></div>
        </div>
        <div class="stats-group">
          <h3>按修改时间</h3>
          <div id="byDate" class="stats-list"></div>
        </div>
        <div class="stats-group">
          <h3>按文件大小</h3>
          <div id="bySize" class="stats-list"></div>
        </div>
      </div>
    </section>

    <section id="filterSection" class="filter-section" style="display:none;">
      <div class="filter-row">
        <div class="filter-item">
          <label>搜索关键词：</label>
          <input type="text" id="searchInput" placeholder="输入文件名或路径搜索..." />
        </div>
        <div class="filter-item">
          <label>文件类型：</label>
          <select id="typeFilter">
            <option value="">全部类型</option>
          </select>
        </div>
        <div class="filter-item">
          <label>状态筛选：</label>
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="待处理">待处理</option>
            <option value="已整理">已整理</option>
            <option value="忽略">忽略</option>
          </select>
        </div>
        <div class="filter-item">
          <label>排序方式：</label>
          <select id="sortSelect">
            <option value="name">按名称</option>
            <option value="size">按大小</option>
            <option value="mtime">按修改时间</option>
            <option value="type">按类型</option>
          </select>
        </div>
      </div>
      <div class="filter-info">
        共 <span id="resultCount">0</span> 个文件
        <span id="batchActions" style="display:none;">
          <button class="btn btn-small" onclick="batchSetStatus('已整理')">批量设为已整理</button>
          <button class="btn btn-small" onclick="batchSetStatus('忽略')">批量设为忽略</button>
          <button class="btn btn-small" onclick="batchSetStatus('待处理')">批量设为待处理</button>
        </span>
      </div>
    </section>

    <section id="fileListSection" class="file-list-section" style="display:none;">
      <div class="list-header">
        <label class="checkbox-label">
          <input type="checkbox" id="selectAll" />
          全选
        </label>
        <span class="col-name">文件名</span>
        <span class="col-type">类型</span>
        <span class="col-size">大小</span>
        <span class="col-date">修改时间</span>
        <span class="col-status">状态</span>
        <span class="col-action">操作</span>
      </div>
      <div id="fileList" class="file-list"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        没有找到匹配的文件
      </div>
    </section>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
